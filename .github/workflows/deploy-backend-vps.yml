name: Deploy Backend to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || '22' }}
          script: |
            set -e

            APP_PATH=${{ secrets.VPS_APP_PATH }}
            if [ -z "$APP_PATH" ]; then
              APP_PATH="/opt/telurio-backend"
            fi

            cd "$APP_PATH"

            git fetch origin main
            git reset --hard origin/main

            docker build -t telurio-backend:latest .

            docker rm -f telurio-backend || true

            docker run -d \
              --name telurio-backend \
              --restart unless-stopped \
              --env-file .env \
              -p 3000:3000 \
              --memory=768m \
              --memory-swap=768m \
              telurio-backend:latest

            docker exec telurio-backend npx prisma migrate deploy
